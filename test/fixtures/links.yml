# Products for the fixtures suite. The table is `links`, so the fixture
# accessor is `links(:product)` (the model is Link; new code calls it a
# product). Mirrors `create(:product)`: a $1 digital product owned by the
# standard seller.
#
# Columns spelled out because fixtures bypass callbacks/validations/defaults:
# - unique_permalink: normally generated by a `before_validation`; validated
#   for presence and `/\A[a-zA-Z_]+\z/` (letters/underscores only, no digits).
# - native_type / filetype / filegroup / discover_fee_per_thousand: each has a
#   column default AND a validation, so spell them out (see migration doc).
# - flags: 65536 is bit 17 = display_product_reviews, which the product factory
#   turns on by default.
# The matching price lives in prices.yml (product.price_cents reads from it).

product:
  user: named_seller
  name: The Works of Edgar Gumstein
  description: A collection of works spanning 1984 — 1994.
  unique_permalink: coreproduct
  price_cents: 100
  price_currency_type: usd
  native_type: digital
  filetype: link
  filegroup: url
  discover_fee_per_thousand: 100
  flags: 65536
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>
