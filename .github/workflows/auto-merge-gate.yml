name: auto-merge-gate

# Deterministic eligibility check for the support→ship safe lane.
#
# GREEN  => PR is a small, bot-signed, ticket-scoped fix touching ONLY
#           allowlisted safe paths; eligible for unattended auto-merge.
# RED    => PR is complex or sensitive; auto-merge will NOT run and the change
#           routes to the human one-tap approval lane.
#
# SECURITY (finding #1 — self-refuting check):
#   This job MUST evaluate using TRUSTED code, never the PR's checkout, or a
#   malicious PR could rewrite the gate to pass. We therefore:
#     * trigger on `pull_request_target` (runs in the BASE repo context), and
#     * explicitly run the gate script + allowlist FROM THE BASE REF
#       (github.event.pull_request.base.sha), not from the PR head.
#   We never check out or execute PR-authored code in this job.
#
#   Authorization (finding #4) comes from VERIFIED per-commit signatures pulled
#   from the API — not the mutable PR author field. The label is read from the
#   API too. The job has read-only permissions and no build/test of PR code.
#
# This check is advisory until added as a REQUIRED status check in branch
# protection. The merge itself is GitHub native auto-merge, which only fires
# when every required check (including this) is green — this job never merges.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: write        # to enable GitHub native auto-merge on eligible PRs
  pull-requests: write   # to add/remove the `auto-merge-eligible` label
  statuses: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      # Check out the BASE ref explicitly — this is trusted code from the
      # protected branch, NOT the PR's contents.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      # Make the PR head commits available to diff against, without merging
      # or executing them.
      - name: Fetch PR head for diffing
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: git fetch --no-tags origin "$HEAD_SHA"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.3"

      # Pull VERIFIED commit signers + label from the API (trusted metadata),
      # not from PR-mutable fields.
      - name: Resolve verified commit signers and label
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # --paginate walks ALL commit pages (finding: signer check ignored
          # pages past the first 30). We collect every commit into one JSON array.
          commits=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/commits" \
            --jq '.[]' | jq -s '.')

          total=$(echo "$commits" | jq 'length')

          # Extract the ACTUAL verified signer identity per commit, not a literal
          # constant (finding: verified commits were all misattributed to the bot).
          # A commit counts as bot-signed ONLY if BOTH:
          #   * cryptographic signature verified by GitHub, AND
          #   * GitHub-resolved author login == the bot account.
          # `.author.login` is GitHub's resolved identity for the signing key, so
          # a different collaborator's verified commit yields THEIR login, not the
          # bot's, and the Ruby gate then blocks it.
          #
          # SECURITY: authenticate the COMMITTER, not the author. GitHub binds the
          # verifying key to the committer email, so `.committer.login` is the
          # identity cryptographically tied to the signature. `.author.login` is
          # spoofable — an attacker can set author email to the bot's noreply
          # address (resolving .author.login -> bot) while signing with their own
          # key (verification.verified == true). Reading the committer closes that.
          signers=$(echo "$commits" | jq -r \
            '[.[] | if (.commit.verification.verified == true) and (.committer.login != null)
                    then .committer.login else "unverified" end] | join(",")')

          if [ "$total" = "0" ] || [ -z "$signers" ]; then
            signers="unverified"
          fi

          label=$(gh api "repos/$REPO/pulls/$PR_NUMBER" \
            --jq '[.labels[].name] | index("support-fix") != null')
          echo "signers=$signers" >> "$GITHUB_OUTPUT"
          echo "label=$label" >> "$GITHUB_OUTPUT"

      - name: Evaluate auto-merge eligibility (from trusted base script)
        id: gate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SIGNERS: ${{ steps.meta.outputs.signers }}
          LABEL: ${{ steps.meta.outputs.label }}
        run: |
          set +e
          out="$(ruby scripts/auto_merge_gate.rb \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --commit-signers "$SIGNERS" \
            --label-verified "$LABEL" 2>&1)"
          rc=$?
          echo "result=$rc" >> "$GITHUB_OUTPUT"
          # Preserve the gate's human-readable reasoning for the job summary.
          { echo "reasons<<__GATE_EOF__"; echo "$out"; echo "__GATE_EOF__"; } >> "$GITHUB_OUTPUT"
          echo "$out"
          exit 0

      # Always GREEN. A red check here used to be ambiguous — humans couldn't
      # tell "not auto-merge-eligible (normal — routes to a human)" from a real
      # failing spec. So eligibility is now carried by the `auto-merge-eligible`
      # LABEL (the machine signal for native auto-merge to key on), the commit
      # status is always success with a descriptive note, and the reasons go to
      # the job summary. This job never fails and never merges anything.
      - name: Publish eligibility (label + status + summary; never red)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_NODE_ID: ${{ github.event.pull_request.node_id }}
          RESULT: ${{ steps.gate.outputs.result }}
          REASONS: ${{ steps.gate.outputs.reasons }}
        run: |
          set -euo pipefail

          # Query the PR's CURRENT native-auto-merge arm state (enabledAt is null
          # when not armed). Used to decide whether the ineligible path has real
          # work to do, and to VERIFY a disarm actually took effect.
          armed_state() {
            gh api graphql -f query='
              query($pr:ID!){ node(id:$pr){ ... on PullRequest{ autoMergeRequest{ enabledAt } } } }
            ' -f pr="$PR_NODE_ID" --jq '.data.node.autoMergeRequest.enabledAt' 2>/dev/null || echo "unknown"
          }

          if [ "$RESULT" = "0" ]; then
            desc="Eligible for safe-lane auto-merge"
            verdict="✅ **Eligible for safe-lane auto-merge** — small, bot-signed, ticket-scoped, allowlisted paths only."
            gh api -X POST "repos/$REPO/issues/$PR_NUMBER/labels" -f "labels[]=auto-merge-eligible" >/dev/null 2>&1 || true
            # Arm GitHub NATIVE auto-merge (SQUASH — the only method the ruleset
            # permits). This does NOT merge now: native auto-merge only fires once
            # EVERY required status check on `main` is green. Until the ruleset
            # requires checks, this call is a harmless no-op.
            #
            # expectedHeadOid BINDS the arming to the exact commit this run gated
            # ($HEAD_SHA). If the PR was synchronized after the gate evaluated,
            # the OIDs differ and GitHub REJECTS the mutation — so a stale run can
            # never arm auto-merge for an unevaluated commit. Best-effort: failing
            # to arm is fail-safe (an un-armed PR simply won't auto-merge).
            if gh api graphql -f query='
              mutation($pr:ID!, $sha:GitObjectID!){
                enablePullRequestAutoMerge(input:{pullRequestId:$pr, mergeMethod:SQUASH, expectedHeadOid:$sha}){
                  pullRequest{ number autoMergeRequest{ enabledAt } }
                }
              }' -f pr="$PR_NODE_ID" -f sha="$HEAD_SHA" >/dev/null 2>&1; then
              echo "native auto-merge armed for $HEAD_SHA (fires when required checks pass)"
            else
              echo "auto-merge enable skipped (stale head, no-op until required checks configured, or already armed)"
            fi
          else
            desc="Routes to human approval (advisory — not a failure)"
            verdict="🔶 **Not auto-merge-eligible — routes to the human one-tap approval lane.** This is **not** a build/spec failure; a human reviews and merges. Reasons below."
            gh api -X DELETE "repos/$REPO/issues/$PR_NUMBER/labels/auto-merge-eligible" >/dev/null 2>&1 || true
            # An ineligible PR MUST NOT stay armed (e.g. a later push moved it from
            # GREEN to RED). Only act if it is actually armed, then VERIFY. If we
            # cannot prove it is disarmed, FAIL CLOSED: post a red required check
            # and fail the job so the ineligible head cannot merge on green checks.
            state="$(armed_state)"
            if [ -n "$state" ] && [ "$state" != "null" ]; then
              disarmed="no"
              for attempt in 1 2 3; do
                gh api graphql -f query='
                  mutation($pr:ID!){ disablePullRequestAutoMerge(input:{pullRequestId:$pr}){ pullRequest{ number } } }
                ' -f pr="$PR_NODE_ID" >/dev/null 2>&1 || true
                after="$(armed_state)"
                if [ -z "$after" ] || [ "$after" = "null" ]; then disarmed="yes"; break; fi
                sleep 3
              done
              if [ "$disarmed" != "yes" ]; then
                gh api -X POST "repos/$REPO/statuses/$HEAD_SHA" \
                  -f state="error" \
                  -f context="auto-merge-gate" \
                  -f description="Ineligible PR still armed for auto-merge; blocking (fail-closed)" >/dev/null || true
                {
                  echo "## Auto-merge eligibility"
                  echo
                  echo "🔴 **Blocked (fail-closed).** This PR is not auto-merge-eligible, but native auto-merge was armed and could not be disabled after retries. Merge is blocked by a red \`auto-merge-gate\` check until a human disarms it."
                } >> "$GITHUB_STEP_SUMMARY"
                echo "FAIL CLOSED: ineligible PR remains armed for auto-merge" >&2
                exit 1
              fi
              echo "native auto-merge disarmed (PR is not eligible)"
            fi
          fi
          # Reached only on safe paths (eligible, or ineligible+not-armed, or
          # ineligible+successfully-disarmed). Eligibility is carried by the label,
          # not by a red check, so this advisory status stays green.
          gh api -X POST "repos/$REPO/statuses/$HEAD_SHA" \
            -f state="success" \
            -f context="auto-merge-gate" \
            -f description="$desc" >/dev/null
          {
            echo "## Auto-merge eligibility"
            echo
            echo "$verdict"
            if [ "$RESULT" != "0" ] && [ -n "${REASONS:-}" ]; then
              echo
              echo "<details><summary>Why this routes to a human</summary>"
              echo
              echo '```'
              echo "$REASONS"
              echo '```'
              echo
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
