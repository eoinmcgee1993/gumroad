steps:
  - label: ":docker: Build Base Image"
    key: preview-build-base-image
    command: ".buildkite/scripts/build_base.sh"
    timeout_in_minutes: 60
    plugins:
      - docker-login#v3.0.0:
          username: gumroadteam
          password-env: DOCKERHUB_PASSWORD

  - label: ":docker: Build Web Image"
    key: preview-build-web-image
    command: ".buildkite/scripts/build_web.sh"
    depends_on: preview-build-base-image
    timeout_in_minutes: 25
    plugins:
      - docker-login#v3.0.0:
          username: gumroadteam
          password-env: DOCKERHUB_PASSWORD

  # The branch app nginx image is content-addressed (tagged by the last commit
  # touching docker/branch_app_nginx) and has no dependency on the base/web
  # images or compiled assets, so it builds in parallel with the rest of the
  # pipeline instead of serially inside the deploy step.
  - label: ":docker: Build Branch App Nginx Image"
    key: preview-build-nginx-image
    command: ".buildkite/scripts/build_branch_app_nginx.sh"
    timeout_in_minutes: 15
    plugins:
      - docker-login#v3.0.0:
          username: gumroadteam
          password-env: DOCKERHUB_PASSWORD

  - label: ":gear: Compile Assets"
    key: preview-compile-assets
    depends_on: preview-build-web-image
    command: ".buildkite/scripts/compile_assets.sh"
    artifact_paths: "log/**/*"
    timeout_in_minutes: 25
    plugins:
      - docker-login#v3.0.0:
          username: "gumroadteam"
          password-env: DOCKERHUB_PASSWORD
      - docker-login#v3.0.0:
          server: quay.io
          username: gumroad
          password-env: QUAY_PASSWORD

  # Provisioning (spin up the EC2 instance, create the app's databases/redis,
  # run first-deploy migrations) needs only the Ruby code in the web image, not
  # compiled assets — so it depends on the web image alone and runs in parallel
  # with the ~13-min Compile Assets step instead of serially after it. On a
  # first deploy the instance boots and the environment is ready by the time
  # the assets are compiled, leaving only the app boot to happen afterwards.
  # See deploy.sh in the deployment repo for the provision/release split.
  - label: ":package: Provision Preview Environment"
    key: preview-provision
    depends_on: preview-build-web-image
    command: ".buildkite/scripts/provision_preview.sh"
    timeout_in_minutes: 30
    plugins:
      - docker-login#v3.0.0:
          username: "gumroadteam"
          password-env: DOCKERHUB_PASSWORD

  - label: ":rocket: Deploy Preview App"
    key: build-and-deploy-preview
    depends_on:
      - preview-compile-assets
      - preview-build-nginx-image
      - preview-provision
    command: ".buildkite/scripts/deploy_branch.sh"
    timeout_in_minutes: 45
    plugins:
      - docker-login#v3.0.0:
          username: "gumroadteam"
          password-env: DOCKERHUB_PASSWORD
